# ASOFS - Dispositivos de bloque y carácter
# ==========================================
# Simula dispositivos típicos de /dev

root:
  # Dispositivos de carácter (char)
  - name: "null"
    type: char
    major: 1
    minor: 3
    mode: "0666"

  - name: "zero"
    type: char
    major: 1
    minor: 5
    mode: "0666"

  - name: "random"
    type: char
    major: 1
    minor: 8
    mode: "0666"

  - name: "tty0"
    type: char
    major: 4
    minor: 0
    mode: "0620"

  # Dispositivos de bloque (block)
  - name: "sda"
    type: block
    major: 8
    minor: 0
    mode: "0660"

  - name: "sda1"
    type: block
    major: 8
    minor: 1
    mode: "0660"

  - name: "loop0"
    type: block
    major: 7
    minor: 0
    mode: "0660"

  # Directorio simulando /dev
  - name: "dev"
    type: dir
    children:
      - name: "console"
        type: char
        major: 5
        minor: 1
        mode: "0600"

      - name: "ttyUSB0"
        type: char
        major: 188
        minor: 0
        mode: "0660"

      - name: "nvme0n1"
        type: block
        major: 259
        minor: 0
        mode: "0660"
